<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Ops Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="particles-js"></div>
    <div id="toast-container"></div>

    <div class="auth-container">
        <div class="glass-panel auth-card">
            
            <h2 style="margin-bottom: 5px;"><i class="fa-solid fa-shield-halved text-accent"></i> CI/CD Pipeline </h2>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 30px;">Authenticate to access the orchestration dashboard.</p>
            
            <!-- Async Ajax Form Submission -->
            <form method="POST" action="{{ url_for('login') }}" class="async-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-user" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                        <input type="text" id="username" name="username" class="form-control" style="padding-left: 40px;" placeholder="Admin Username" required autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-lock" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                        <input type="password" id="password" name="password" class="form-control" style="padding-left: 40px;" placeholder="Secure Password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mb-3" style="margin-top: 15px;">
                    <span class="btn-text-content">Execute Login <i class="fa-solid fa-arrow-right" style="margin-left: 6px;"></i></span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--glass-border); font-size: 0.85rem; color: var(--text-muted);">
                Demo Credentials:<br>
                <strong style="color:white;">u:</strong> admin &nbsp;|&nbsp; <strong style="color:white;">p:</strong> admin123
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
