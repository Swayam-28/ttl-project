<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Animated Particle Background Engine -->
    <div id="particles-js"></div>

    <!-- Application Wrapper -->
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar glass-panel">
            <div class="brand">
                <i class="fa-solid fa-server fa-lg text-accent"></i>
                <h2>Dashboard</h2>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}"><i class="fa-solid fa-gauge"></i> Terminal Ops</a></li>
                <li><a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}"><i class="fa-solid fa-clock-rotate-left"></i> Webhook Event Log</a></li>
                <li><a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}"><i class="fa-solid fa-circle-info"></i> About System</a></li>
                <li style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('logout') }}"><i class="fa-solid fa-right-from-bracket"></i> Logout {{ current_user.username }}</a>
                    {% else %}
                        <a href="{{ url_for('login') }}"><i class="fa-solid fa-shield-halved"></i> Admin Login</a>
                    {% endif %}
                </li>
            </ul>
        </nav>

        <!-- Dynamic Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Toast Popups -->
    <div id="toast-container"></div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
