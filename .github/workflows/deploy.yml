name: CI/CD Pipeline

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Get code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Build Docker image
    - name: Build Docker image
      run: docker build -t ttl-app .

    # 4. (Optional) Run container test
    - name: Run container test
      run: |
        docker run -d -p 5000:5000 ttl-app
        sleep 5
        curl http://localhost:5000

    # 5. Deploy trigger (Render auto deploy)
    - name: Trigger Render Deploy
      run: echo "Deployment handled by Render auto-deploy"